apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracking
  template:
    metadata:
      labels:
        app: tracking
    spec:
      containers:
        - name: tracking
          image: compose-tracking:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RIDENOW_RUNTIME_MODE
              value: real
            - name: RIDENOW_SERVICE_NAME
              value: tracking
            - name: RIDENOW_HTTP_PORT
              value: "8006"
            - name: RIDENOW_RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          ports:
            - containerPort: 8006
          readinessProbe:
            httpGet:
              path: /ready
              port: 8006
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
---
apiVersion: v1
kind: Service
metadata:
  name: tracking
spec:
  selector:
    app: tracking
  ports:
    - name: http
      port: 8006
      targetPort: 8006
