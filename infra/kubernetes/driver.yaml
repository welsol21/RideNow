apiVersion: apps/v1
kind: Deployment
metadata:
  name: driver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: driver
  template:
    metadata:
      labels:
        app: driver
    spec:
      containers:
        - name: driver
          image: compose-driver:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RIDENOW_RUNTIME_MODE
              value: real
            - name: RIDENOW_SERVICE_NAME
              value: driver
            - name: RIDENOW_HTTP_PORT
              value: "8002"
            - name: RIDENOW_RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          ports:
            - containerPort: 8002
          readinessProbe:
            httpGet:
              path: /ready
              port: 8002
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: driver
spec:
  selector:
    app: driver
  ports:
    - name: http
      port: 8002
      targetPort: 8002
