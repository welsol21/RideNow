apiVersion: apps/v1
kind: Deployment
metadata:
  name: route
spec:
  replicas: 1
  selector:
    matchLabels:
      app: route
  template:
    metadata:
      labels:
        app: route
    spec:
      containers:
        - name: route
          image: compose-route:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RIDENOW_RUNTIME_MODE
              value: real
            - name: RIDENOW_SERVICE_NAME
              value: route
            - name: RIDENOW_HTTP_PORT
              value: "8003"
            - name: RIDENOW_RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          ports:
            - containerPort: 8003
          readinessProbe:
            httpGet:
              path: /ready
              port: 8003
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
---
apiVersion: v1
kind: Service
metadata:
  name: route
spec:
  selector:
    app: route
  ports:
    - name: http
      port: 8003
      targetPort: 8003
