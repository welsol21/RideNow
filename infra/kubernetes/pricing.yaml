apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pricing
  template:
    metadata:
      labels:
        app: pricing
    spec:
      containers:
        - name: pricing
          image: compose-pricing:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RIDENOW_RUNTIME_MODE
              value: real
            - name: RIDENOW_SERVICE_NAME
              value: pricing
            - name: RIDENOW_HTTP_PORT
              value: "8004"
            - name: RIDENOW_RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          ports:
            - containerPort: 8004
          readinessProbe:
            httpGet:
              path: /ready
              port: 8004
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
---
apiVersion: v1
kind: Service
metadata:
  name: pricing
spec:
  selector:
    app: pricing
  ports:
    - name: http
      port: 8004
      targetPort: 8004
