apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
        - name: payment
          image: compose-payment:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RIDENOW_RUNTIME_MODE
              value: real
            - name: RIDENOW_SERVICE_NAME
              value: payment
            - name: RIDENOW_HTTP_PORT
              value: "8005"
            - name: RIDENOW_RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          ports:
            - containerPort: 8005
          readinessProbe:
            httpGet:
              path: /ready
              port: 8005
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
---
apiVersion: v1
kind: Service
metadata:
  name: payment
spec:
  selector:
    app: payment
  ports:
    - name: http
      port: 8005
      targetPort: 8005
